# PubLedge Project Configuration
# Edit this file to define the PubLedge ontology, then run: node scripts/build.js

# ---------------------------------------------------------------------------
# Project identity
# ---------------------------------------------------------------------------
name: "PubLedge"
short_name: "publedge"
url: "https://publedge.org/"
repo: "https://github.com/snapsynapse/publedge"
description: "Transparent recordkeeping protocol for fact-specific written interpretations between two parties — JIAs, RMAs, no-action letters, private letter rulings, and analogous instruments."

# ---------------------------------------------------------------------------
# Entity model — the ontology
#
# Mapped to Semantic Arts gist (CC-BY 4.0) upper ontology.
# See /reference/vocabulary/ and vendor/gist/ for the binding.
#
#   Authority  → GovernmentOrganization (gist:GovernmentOrganization)
#   Container  → Instrument: JIA (gist:Agreement) or RMA (gist:Contract)
#   Secondary  → Term (gist:ContractTerm)
#   Primary    → Obligation (gist:Requirement | gist:Restriction | gist:Permission)
# ---------------------------------------------------------------------------
entities:
  primary:
    name: Obligation
    plural: Obligations
    directory: obligations
    groups:
      - name: requirement
        color: "#1a4180"
        color_light: "#0f2e5c"
      - name: restriction
        color: "#c73041"
        color_light: "#a31f34"
      - name: permission
        color: "#1f7a43"
        color_light: "#1f7a43"
    body_sections:
      - Summary
      - What Counts
      - What Does Not Count
      - Statute Anchors

  container:
    name: Legal Instrument
    plural: Legal Instruments
    directory: instruments
    # Status vocabulary — see DEFINITIONS.md for semantics + lifecycle.
    # proposed/enacted/enforcing/phased-enforcement/pending-replacement
    # track EveryAILaw's convention verbatim for cross-registry joins.
    statuses:
      - name: proposed
        color: "#d4a017"
        color_light: "#b8860b"
      - name: enacted
        color: "#2a7ab0"
        color_light: "#1a5fa3"
      - name: enforcing
        color: "#1f7a43"
        color_light: "#1f7a43"
      - name: phased-enforcement
        color: "#1f7a43"
        color_light: "#1f7a43"
      - name: pending-replacement
        color: "#c88e1a"
        color_light: "#a17011"
      - name: expired
        color: "#7a8599"
        color_light: "#5a6572"
      - name: superseded
        color: "#7a8599"
        color_light: "#5a6572"
      - name: withdrawn
        color: "#a64a4a"
        color_light: "#803535"
      - name: terminated
        color: "#c73041"
        color_light: "#a31f34"
    has_timeline: true
    scope_field: jurisdiction

  authority:
    name: Authority
    plural: Authorities
    directory: authorities

  secondary:
    name: Term
    plural: Terms
    directory: terms
    relationship: "establishes"

# Mapping file — connects instruments to obligations via terms
mapping:
  file: "mapping/index.yml"

