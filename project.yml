# ---------------------------------------------------------------------------
# Bridge pages — SEO-targeted detail pages
# ---------------------------------------------------------------------------
bridges:
  requires: true
  compare: true
  applies_to:
    field: jurisdiction

# ---------------------------------------------------------------------------
# Theme colors — civic blue / regulatory tone
# ---------------------------------------------------------------------------
theme:
  accent: "#1a4180"
  accent_light: "#0f2e5c"
  accent_bg: "#0f2e5c"
  accent_bg_light: "#e8eef7"

# ---------------------------------------------------------------------------
# Pattern page — describes the Knowledge as Code pattern PubLedge inherits from
# ---------------------------------------------------------------------------
pattern:
  enabled: true
  canonical_url: "https://knowledge-as-code.com"
  examples:
    - name: "AI Tool Watch"
      url: "https://aitool.watch"
      description: "AI model capabilities across 12 products"
    - name: "Every AI Law"
      url: "https://everyailaw.com"
      description: "Global AI regulatory landscape"
    - name: "Virtual Classroom Watch"
      url: "https://VirtualClassroom.watch/"
      description: "Meeting facilitation standards"

# ---------------------------------------------------------------------------
# Social / Open Graph meta tags
# ---------------------------------------------------------------------------
social:
  og_image: "/imgs/og.png"
  twitter_card: "summary_large_image"

# ---------------------------------------------------------------------------
# Verification — staleness detection for entity freshness
# ---------------------------------------------------------------------------
verification:
  staleness_days: 90
  # Relationship-only instruments intentionally kept in the registry to
  # preserve amendment/supersession chains even when they do not introduce
  # standalone PubLedge obligation mappings.
  allowed_unmapped_instruments:
    - us-co-legislature-statute-2024-sb24-205
    - us-co-legislature-statute-2025-sb25b-004
    - us-co-legislature-statute-2026-sb26-189
    - us-ut-legislature-statute-2025-sb332

# ---------------------------------------------------------------------------
# Ontology framework — semantic layer binding PubLedge entities to gist
#
# Adds @type to JSON API items and emits api/v1/context.jsonld.
# gist is a minimalist enterprise upper ontology by Semantic Arts (CC BY 4.0).
# Attribution required when publishing sites that use gist IRIs.
# To disable: set enabled: false (removes @type fields and context.jsonld).
# ---------------------------------------------------------------------------
ontology:
  enabled: true
  framework: "gist"
  base_iri: "https://ontologies.semanticarts.com/gist/"
  attribution: "Semantic Arts, Inc. gist ontology (CC BY 4.0) https://semanticarts.com/gist"
  entities:
    primary:
      gist_class: "gist:Requirement"
    container:
      gist_class: "gist:Agreement"
    authority:
      gist_class: "gist:GovernmentOrganization"
    secondary:
      gist_class: "gist:ContractTerm"

# ---------------------------------------------------------------------------
# Hierarchy — canonical URL architecture
#
# Canonical pattern: /{country}/{jurisdiction}/{authority}/{instrument-type}/{instance}
# Example: /us/utah/oaip/rma/2025-001
#
# Each jurisdiction key maps its frontmatter value (e.g. `us-ut`) to URL segments.
# Each authority file declares its own `url_segment` in its frontmatter.
# Instrument type URL segments are declared below.
# ---------------------------------------------------------------------------
hierarchy:
  enabled: true
  jurisdictions:
    us-ut:
      country: us
      region: utah
      label: "Utah"
    us-co:
      country: us
      region: colorado
      label: "Colorado"
    us:
      country: us
      region: federal
      label: "US Federal"
  type_segments:
    rma: rma
    jia: jia
    statute: statute
    advisory-opinion: ao
    interpretive-letter: il
    private-letter-ruling: plr
    no-action-letter: nal
  type_labels:
    rma: "Regulatory Mitigation Agreement"
    jia: "Joint Interpretation Agreement"
    statute: "Statute"
    advisory-opinion: "Advisory Opinion"
    interpretive-letter: "Interpretive Letter"
    private-letter-ruling: "Private Letter Ruling"
    no-action-letter: "No-Action Letter"
  legacy_prefix: container
  emit_json_endpoints: true
  emit_jsonld: true

# ---------------------------------------------------------------------------
# Ecosystem — related projects shown on pattern/about pages
# ---------------------------------------------------------------------------
ecosystem:
  - name: "Knowledge as Code"
    url: "https://knowledge-as-code.com"
    description: "The pattern definition and community hub"
  - name: "Every AI Law"
    url: "https://everyailaw.com"
    description: "Global AI regulatory landscape — statute reference spine for PubLedge JIAs"
  - name: "gist (Semantic Arts)"
    url: "https://semanticarts.com/gist/"
    description: "Upper ontology PubLedge schemas bind to (CC-BY 4.0)"
  - name: "Skill Provenance"
    url: "https://skillprovenance.dev"
    description: "Manifest + hash integrity pattern PubLedge ships from day one"
  - name: "Siteline"
    url: "https://siteline.to"
    description: "AI agent readiness scanner for websites"
