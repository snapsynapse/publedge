# PubLedge Project Configuration
# Edit this file to define the PubLedge ontology, then run: node scripts/build.js

# ---------------------------------------------------------------------------
# Project identity
# ---------------------------------------------------------------------------
name: "PubLedge"
short_name: "publedge"
url: "https://publedge.org/"
repo: "https://github.com/snapsynapse/publedge"
description: "Transparent recordkeeping protocol for fact-specific written interpretations between two parties — JIAs, RMAs, no-action letters, private letter rulings, and analogous instruments."

# ---------------------------------------------------------------------------
# Entity model — the ontology
#
# Mapped to Semantic Arts gist (CC-BY 4.0) upper ontology.
# See /reference/vocabulary/ and vendor/gist/ for the binding.
#
#   Authority  → GovernmentOrganization (gist:GovernmentOrganization)
#   Container  → Instrument: JIA (gist:Agreement) or RMA (gist:Contract)
#   Secondary  → Term (gist:ContractTerm)
#   Primary    → Obligation (gist:Requirement | gist:Restriction | gist:Permission)
# ---------------------------------------------------------------------------
entities:
  primary:
    name: Obligation
    plural: Obligations
    directory: obligations
    groups:
      - name: requirement
        color: "#1a4180"
        color_light: "#0f2e5c"
      - name: restriction
        color: "#c73041"
        color_light: "#a31f34"
      - name: permission
        color: "#2a8a54"
        color_light: "#1f7a43"
    body_sections:
      - Summary
      - What Counts
      - What Does Not Count
      - Statute Anchors

  container:
    name: Instrument
    plural: Instruments
    directory: instruments
    statuses:
      - name: draft
        color: "#d4a017"
        color_light: "#b8860b"
      - name: reviewed
        color: "#2a7ab0"
        color_light: "#1a5fa3"
      - name: published
        color: "#2a8a54"
        color_light: "#1f7a43"
      - name: superseded
        color: "#7a8599"
        color_light: "#5a6572"
    has_timeline: true
    scope_field: jurisdiction

  authority:
    name: Authority
    plural: Authorities
    directory: authorities

  secondary:
    name: Term
    plural: Terms
    directory: terms
    relationship: "establishes"

# Mapping file — connects instruments to obligations via terms
mapping:
  file: "mapping/index.yml"

# ---------------------------------------------------------------------------
# Site navigation
# ---------------------------------------------------------------------------
nav:
  - id: protocol
    label: Protocol
    href: reference/protocol/
  - id: containers
    label: Registry
    href: containers.html
  - id: templates
    label: Templates
    href: templates/
  - id: primaries
    label: Obligations
    href: primaries.html
  - id: matrix
    label: Matrix
    href: matrix.html

# Secondary links surfaced in the footer rather than the top nav
# to keep the header short and scannable. Rendering handled by
# build-extras.js (post-build HTML patch).
footer_nav:
  - heading: Explore
    links:
      - label: Timeline
        href: timeline.html
      - label: Compare
        href: compare.html
      - label: Applicability
        href: primaries.html
  - heading: Reference
    links:
      - label: Prior Art
        href: reference/prior-art/
      - label: Vocabulary
        href: reference/vocabulary/
      - label: Pattern
        href: pattern.html
      - label: About
        href: about.html
  - heading: Related
    links:
      - label: Knowledge as Code
        href: https://knowledge-as-code.com/
      - label: EveryAILaw
        href: https://everyailaw.com/
      - label: PAICE.work
        href: https://paice.work/
      - label: gist (Semantic Arts)
        href: https://semanticarts.com/gist/

# ---------------------------------------------------------------------------
# Bridge pages — SEO-targeted detail pages
# ---------------------------------------------------------------------------
bridges:
  requires: true
  compare: true
  applies_to:
    field: jurisdiction

# ---------------------------------------------------------------------------
# Theme colors — civic blue / regulatory tone
# ---------------------------------------------------------------------------
theme:
  accent: "#1a4180"
  accent_light: "#0f2e5c"
  accent_bg: "#0f2e5c"
  accent_bg_light: "#e8eef7"

# ---------------------------------------------------------------------------
# Pattern page — describes the Knowledge as Code pattern PubLedge inherits from
# ---------------------------------------------------------------------------
pattern:
  enabled: true
  canonical_url: "https://knowledge-as-code.com"
  examples:
    - name: "AI Tool Watch"
      url: "https://aitool.watch"
      description: "AI model capabilities across 12 products"
    - name: "Every AI Law"
      url: "https://everyailaw.com"
      description: "Global AI regulatory landscape"
    - name: "Meeting Standards Reference"
      url: "https://meetings.snapsynapse.com"
      description: "Meeting facilitation standards"

# ---------------------------------------------------------------------------
# Social / Open Graph meta tags
# ---------------------------------------------------------------------------
social:
  og_image: "/imgs/og.png"
  twitter_card: "summary_large_image"
  twitter_site: ""

# ---------------------------------------------------------------------------
# Verification — staleness detection for entity freshness
# ---------------------------------------------------------------------------
verification:
  staleness_days: 90

# ---------------------------------------------------------------------------
# Ontology framework — semantic layer binding PubLedge entities to gist
#
# Adds @type to JSON API items and emits api/v1/context.jsonld.
# gist is a minimalist enterprise upper ontology by Semantic Arts (CC BY 4.0).
# Attribution required when publishing sites that use gist IRIs.
# To disable: set enabled: false (removes @type fields and context.jsonld).
# ---------------------------------------------------------------------------
ontology:
  enabled: true
  framework: "gist"
  base_iri: "https://ontologies.semanticarts.com/gist/"
  attribution: "Semantic Arts, Inc. gist ontology (CC BY 4.0) https://semanticarts.com/gist"
  entities:
    primary:
      gist_class: "gist:Requirement"
    container:
      gist_class: "gist:Agreement"
    authority:
      gist_class: "gist:GovernmentOrganization"
    secondary:
      gist_class: "gist:ContractTerm"

# ---------------------------------------------------------------------------
# Ecosystem — related projects shown on pattern/about pages
# ---------------------------------------------------------------------------
ecosystem:
  - name: "Knowledge as Code"
    url: "https://knowledge-as-code.com"
    description: "The pattern definition and community hub"
  - name: "Every AI Law"
    url: "https://everyailaw.com"
    description: "Global AI regulatory landscape — statute reference spine for PubLedge JIAs"
  - name: "gist (Semantic Arts)"
    url: "https://www.semanticarts.com/gist/"
    description: "Upper ontology PubLedge schemas bind to (CC-BY 4.0)"
  - name: "Skill Provenance"
    url: "https://skillprovenance.dev"
    description: "Manifest + hash integrity pattern PubLedge ships from day one"
  - name: "Siteline"
    url: "https://siteline.to"
    description: "AI agent readiness scanner for websites"
