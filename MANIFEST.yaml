# PubLedge Content Provenance Manifest
#
# Tracks SHA-256 hashes of canonical PubLedge source content for tamper
# detection and reproducibility. Run `./scripts/validate-hashes.sh` to
# verify, or `./scripts/validate-hashes.sh --update` to recompute after
# intentional edits.
#
# Hash mechanism adapted from skill-provenance (https://skillprovenance.dev).
# PubLedge uses only the integrity pattern, not the full protocol.
#
# Hashed scope:
#   - Protocol, security, verification, changelog, and contribution prose
#   - Project/package/MCP configuration
#   - MCP server, build, validation, eval, and CI workflow code
#   - All canonical data/examples authorities, instruments, obligations, mapping
#   - Templates, schemas, JSON-LD context, and vendored gist snapshot files
#   - License and attribution files
#
# Excluded scope:
#   - Build outputs (docs/)
#   - Generated feeds/API/sitemaps
#   - Editor / OS artifacts
#   - This file (MANIFEST.yaml is the control file)
#   - Workshop scratchpad (_workshop/)

bundle: publedge
bundle_version: 0.1.1-pre
bundle_date: 2026-05-30
description: >
  PubLedge open recordkeeping protocol for fact-specific written
  interpretations between two parties.

upstream:
  - name: skill-provenance
    url: https://skillprovenance.dev
    used_for: hash mechanism only
  - name: gist (Semantic Arts)
    url: https://semanticarts.com/gist/
    used_for: upper ontology binding
    pinned_at: vendor/gist/gistCore.ttl

